<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aai Tailor Management System</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffe6f0;
            font-family: Arial, sans-serif;
        }

        .status-dropdown {
        padding: 8px 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        font-size: 14px;
        background: white;
        }

        button:hover {
        opacity: 0.9;
        transform: scale(1.03);
        transition: 0.2s ease;
        }

        .main-container {
            width: 100%;
            max-width: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

       h1 {
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 22px;
            }
        }
        
    </style>
</head>

<body>
    <div class="main-container">
        <h1>🧵 Aai Tailor</h1>
        {% block content %}{% endblock %}
        <hr style="margin-top:40px;">
        <p style="text-align:center; font-size:12px; color:gray;">
            © 2026 Aai Tailor Management | Built by Swarali 💗
        </p>
    </div>
</body>
</html>
